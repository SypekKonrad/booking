{% extends 'base.html' %}

{% block title %}
<h1 class="pt-2 text-center">List of Customers</h1>
{% endblock %}

{% block content %}
{% for customer in customer_list %}
    <p><a href="{%url 'details' customer.vehicle.id %}">{{customer.first_name}} {{customer.surname}} {{customer.timestamp|date:"SHORT_DATE_FORMAT" }}</a></p>

{% endfor %}


{% endblock %}
